<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Kayıt ol</title>

<style>
  body{
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
  }

  .card{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
    color:white;
  }

  h2{
    text-align:center;
    margin-bottom:20px;
  }

  input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
    border:none;
    outline:none;
    background:#334155;
    color:white;
  }

  input::placeholder{
    color:#94a3b8;
  }

  button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
  }

  #registerBtn{
    background:#22c55e;
    color:black;
  }

  #registerBtn:disabled{
    opacity:.6;
    cursor:not-allowed;
  }

  .pass-wrapper{
    position:relative;
  }

  .eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:14px;
    color:#94a3b8;
  }

  #status{
    text-align:center;
    margin-top:10px;
    font-size:14px;
  }
    .avatar-box{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
    cursor:pointer;
    }

    .avatar-box img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    background:#334155;
    border:2px solid #475569;
    transition:.2s;
    }

    .avatar-box img:hover{
    opacity:.8;
    }
    *{
    box-sizing: border-box;
    }


</style>
</head>

<body>

<div class="card">

    <h2>Kayıt ol</h2>

    <div class="avatar-box">
        <img id="avatarPreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        <input type="file" id="avatar" hidden accept="image/png, image/jpeg, image/gif">
    </div>

    <input id="isim" placeholder="kullanıcı adı">

    <div class="pass-wrapper">
        <input id="password" type="password" placeholder="şifre">
        <span class="eye" id="togglePass">👁</span>
    </div>

    <button id="registerBtn">Kayıt Ol</button>
    <a href="girisyap.html"> <h5>giriş yap</h2></a>
    <p id="status"></p>
</div>


<script type="module">

async function uploadImage(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "babasiker");

    const res = await fetch(
        "https://api.cloudinary.com/v1_1/djvxtznoh/image/upload",
        {
        method: "POST",
        body: formData
        }
    );

    const data = await res.json();

    if (!data.secure_url) return "";

    return data.secure_url;
}


import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyCXoJSM0z0ytF5a0AeyhbdFwy8_DZmN-MM",
authDomain: "tophanerebirth.firebaseapp.com",
databaseURL: "https://tophanerebirth-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "tophanerebirth",
storageBucket: "tophanerebirth.firebasestorage.app",
messagingSenderId: "392712133412",
appId: "1:392712133412:web:3674b7f4fcc42b936531b1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const passwordInput = document.getElementById("password");
const nameInput = document.getElementById("isim");
const statusText = document.getElementById("status");
const registerBtn = document.getElementById("registerBtn");


/* 👁 şifre göster */
document.getElementById("togglePass").onclick = () => {
    passwordInput.type =
        passwordInput.type === "password" ? "text" : "password";
};


document.getElementById("registerBtn").onclick = register;


/* 📝 KAYIT */
const DEFAULT_AVATAR =
  "https://cdn-icons-png.flaticon.com/512/149/149071.png";

async function register() {

    const password = passwordInput.value.trim();
    const isim = nameInput.value.trim();
    const file = document.getElementById("avatar").files[0];

    registerBtn.disabled = true;
    registerBtn.innerText = "Yükleniyor...";

    const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;

    if (!usernameRegex.test(isim)) {
        alert("Sadece harf, sayı, alt çizgi (3-20 karakter)");
        resetBtn();
        return;
    }

    if (!password || password.length < 6) {
        alert("Şifre en az 6 karakter olmalı");
        resetBtn();
        return;
    }

    const email = isim.toLowerCase() + "@test.com";

    let photoURL = DEFAULT_AVATAR;

    try {
        if (file) {
            const uploaded = await uploadImage(file);
            if (uploaded) photoURL = uploaded;
        }

        const userCred = await createUserWithEmailAndPassword(auth, email, password);

        await set(ref(db, "users/" + userCred.user.uid), {
            username: isim,
            createdAt: Date.now(),
            profile: photoURL,
            rank: "uye"
        });

        localStorage.setItem("username", isim);
        localStorage.setItem("profile", photoURL);

        window.location.href = "panel.html";
    } catch (e) {
        statusText.innerText = "Hata: " + e.message;
    }

    resetBtn();
}



function resetBtn(){
    registerBtn.disabled = false;
    registerBtn.innerText = "Kayıt Ol";
}

/* 🖼️ Avatar preview */
const avatarInput = document.getElementById("avatar");
const avatarPreview = document.getElementById("avatarPreview");

avatarPreview.onclick = () => avatarInput.click();

avatarInput.onchange = () => {
    const file = avatarInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        avatarPreview.src = e.target.result;
    };
    reader.readAsDataURL(file);
};


</script>
</body>
</html>
